<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейное Шоу: Кто Я?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-card">
        <!-- Анимированный неон вокруг карты -->
        <div class="card-glow"></div>
        
        <div class="score-board">Угадано: <span id="score">0</span></div>
        <div id="timer" class="timer">60</div>
        
        <h1 id="wordDisplay">ГОТОВ К ИГРЕ?</h1>
        
        <div class="button-group">
            <button id="startBtn" class="btn-main">🎲 СЛЕДУЮЩЕЕ СЛОВО</button>
            <button id="showBtn" class="btn-action" disabled>👁️ ПОКАЗАТЬ СЕМЬЕ</button>
            <button id="hideBtn" class="btn-action" disabled>🙈 СКРЫТЬ ОТ ИГРОКА</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
