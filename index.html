<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейное Шоу: Загадай Сам</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-card">
        <div id="timer" class="timer">60</div>
        
        <div id="inputBlock" class="input-block">
            <input type="text" id="wordInput" placeholder="Что загадаем?..." autocomplete="off">
            <button id="setWordBtn" class="btn-main">🎲 ЗАГРАТЬ</button>
        </div>

        <h1 id="wordDisplay" style="display: none;">???</h1>
        
        <div class="button-group" id="actionGroup" style="display: none;">
            <button id="showBtn" class="btn-action">👁️ ПОКАЗАТЬ СЕМЬЕ</button>
            <button id="hideBtn" class="btn-action">🙈 СКРЫТЬ ОТ ИГРОКА</button>
            <button id="resetBtn" class="btn-reset">🔄 НОВОЕ СЛОВО</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
